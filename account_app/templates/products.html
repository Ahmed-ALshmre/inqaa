<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>منتجات أنيقة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body class="products-page">
  <nav class="navbar navbar-dark navbar-custom fixed-top px-3">
    <div class="nav-main d-flex align-items-center gap-2">
      <span class="navbar-brand fw-bold fs-6 mb-0">
        <i class="bi bi-box-seam-fill me-2"></i>منتجات أنيقة
      </span>
    </div>
    <div class="nav-actions d-flex align-items-center gap-2">
      <a class="btn btn-outline-light btn-sm" href="/dashboard?key={{ request.args.get('key','') }}">
        <i class="bi bi-chat-dots me-1"></i>الداشبورد
      </a>
      <a class="btn btn-outline-light btn-sm" href="/orders?key={{ request.args.get('key','') }}">
        <i class="bi bi-receipt me-1"></i>الطلبات
      </a>
      <a class="btn btn-outline-light btn-sm" href="/analytics?key={{ request.args.get('key','') }}" title="التحليلات">
        <i class="bi bi-graph-up-arrow me-1"></i>التحليلات
      </a>
      <a class="btn btn-outline-light btn-sm" href="/settings?key={{ request.args.get('key','') }}" title="الإعدادات">
        <i class="bi bi-gear me-1"></i>الإعدادات
      </a>
      <input type="file" id="productsImportInput" accept="application/json,.json" style="display:none" onchange="importProductsFile(this)">
      <input type="file" id="databaseImportInput" accept=".db,.sqlite,.sqlite3,application/vnd.sqlite3,application/octet-stream" style="display:none" onchange="importDatabaseFile(this)">
      <div class="btn-group btn-group-sm data-tools" role="group" aria-label="استيراد وتصدير">
        <button class="btn btn-outline-light" type="button" onclick="exportProducts()" title="تصدير المنتجات">
          <i class="bi bi-box-arrow-up"></i><span>منتجات</span>
        </button>
        <button class="btn btn-outline-light" type="button" onclick="document.getElementById('productsImportInput').click()" title="استيراد المنتجات">
          <i class="bi bi-box-arrow-in-down"></i><span>منتجات</span>
        </button>
        <button class="btn btn-outline-light" type="button" onclick="exportDatabase()" title="تصدير قاعدة البيانات">
          <i class="bi bi-database-up"></i><span>DB</span>
        </button>
        <button class="btn btn-outline-light" type="button" onclick="document.getElementById('databaseImportInput').click()" title="استيراد قاعدة البيانات">
          <i class="bi bi-database-down"></i><span>DB</span>
        </button>
      </div>
      <button class="btn btn-outline-light btn-sm" onclick="loadProducts()">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </nav>

  <main class="products-layout">
    <section class="products-list-panel">
      <div class="products-toolbar">
        <div>
          <div class="fw-bold">المنتجات</div>
          <div class="small" style="color:var(--text-muted)" id="productsCount">—</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="newProduct()">
          <i class="bi bi-plus-circle me-1"></i>منتج جديد
        </button>
      </div>
      <div class="p-2 border-bottom" style="border-color:var(--border)!important;">
        <div class="input-group input-group-sm">
          <span class="input-group-text border-0"><i class="bi bi-search" style="color:var(--text-muted)"></i></span>
          <input type="text" class="form-control border-0" id="productSearch" placeholder="بحث بالاسم أو الكود..."
            oninput="renderProducts()">
        </div>
      </div>
      <div class="products-list" id="productsList">
        <div class="text-center py-5" style="color:var(--text-muted)">
          <div class="spinner-border spinner-border-sm mb-2"></div>
          <div class="small">جاري التحميل...</div>
        </div>
      </div>
    </section>

    <section class="product-form-panel">
      <div class="product-form-header">
        <div>
          <div class="fw-bold" id="formTitle">إضافة منتج</div>
          <div class="small" style="color:var(--text-muted)">التعديلات تحفظ مباشرة في products.json</div>
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="newProduct()">
          <i class="bi bi-eraser me-1"></i>تفريغ
        </button>
      </div>

      <form id="productForm" class="product-form" onsubmit="saveProduct(event)">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">كود المنتج</label>
            <input class="form-control" id="productId" required placeholder="P009">
          </div>
          <div class="col-md-8">
            <label class="form-label">اسم المنتج</label>
            <input class="form-control" id="productName" required placeholder="اسم المنتج">
          </div>
          <div class="col-md-4">
            <label class="form-label">السعر</label>
            <input class="form-control" id="productPrice" placeholder="7000 دينار">
          </div>
          <div class="col-md-4">
            <label class="form-label">الحالة</label>
            <select class="form-select" id="productStatus">
              <option value="active">نشط / يظهر بالكتالوج</option>
              <option value="inactive">غير نشط / مخفي</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">المخزون</label>
            <input class="form-control" id="productStock" placeholder="متوفر / نفذ">
          </div>
          <div class="col-md-6">
            <label class="form-label">المقاسات</label>
            <input class="form-control" id="productSizes" placeholder="S / M / L / XL">
          </div>
          <div class="col-md-6">
            <label class="form-label">الألوان</label>
            <input class="form-control" id="productColors" placeholder="وردي، أزرق...">
          </div>
          <div class="col-md-4">
            <label class="form-label">Ref</label>
            <input class="form-control" id="productRef" placeholder="inqi_set_03">
          </div>
          <div class="col-md-4">
            <label class="form-label">Ad ID</label>
            <input class="form-control" id="productAdId" placeholder="38">
          </div>
          <div class="col-md-4">
            <label class="form-label">التصنيف</label>
            <input class="form-control" id="productCategory" placeholder="موديلات وقطع نسائية محتشمة">
          </div>
          <div class="col-12">
            <label class="form-label">روابط الصور</label>
            <textarea class="form-control" id="productImages" rows="4"
              placeholder="/product_image/P009_1.jpg&#10;/product_image/P009_2.jpg"></textarea>
            <div class="small mt-1" style="color:var(--text-muted)">ضع كل صورة في سطر منفصل. يدعم روابط محلية أو روابط خارجية.</div>
          </div>
          <div class="col-12">
            <div class="product-image-preview" id="productImagePreview"></div>
          </div>
          <div class="col-12">
            <label class="form-label">الكلمات المفتاحية</label>
            <textarea class="form-control" id="productKeywords" rows="2"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label">الوصف</label>
            <textarea class="form-control" id="productDescription" rows="4"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label">الوصف البصري للصور</label>
            <textarea class="form-control" id="productVisualDescription" rows="4"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label">العرض</label>
            <input class="form-control" id="productOffer" placeholder="سعر خاص">
          </div>
          <div class="col-md-6">
            <label class="form-label">التوصيل</label>
            <input class="form-control" id="productDelivery" placeholder="توصيل لجميع المحافظات">
          </div>
          <div class="col-12">
            <label class="form-label">ملاحظات</label>
            <textarea class="form-control" id="productNotes" rows="2"></textarea>
          </div>
        </div>

        <div class="product-form-actions">
          <button class="btn btn-primary" type="submit" id="saveProductBtn">
            <i class="bi bi-save me-1"></i>حفظ المنتج
          </button>
          <button class="btn btn-outline-danger" type="button" id="deleteProductBtn" onclick="deleteCurrentProduct()" style="display:none;">
            <i class="bi bi-trash me-1"></i>حذف
          </button>
        </div>
      </form>
    </section>
  </main>

  <div class="toast-container position-fixed bottom-0 start-0 p-3" id="toastContainer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/products.js"></script>
</body>
</html>
