<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1f2937">
  <title>{% block title %}أنيقة{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css?v=4">
</head>
<body class="admin-shell">
  {% set key = request.args.get('key','') %}
  <nav class="admin-topbar">
    <button class="admin-menu-btn" type="button" onclick="toggleAdminNav()" aria-label="القائمة">
      <i class="bi bi-list"></i>
    </button>
    <a class="admin-brand" href="/dashboard?key={{ key }}">
      <i class="bi bi-shop"></i>
      <span>أنيقة</span>
    </a>
    <div class="admin-topbar-actions">
      <a class="btn btn-outline-light btn-sm" href="/settings/maintenance?key={{ key }}">
        <i class="bi bi-arrow-clockwise"></i>
        <span>تحديث</span>
      </a>
    </div>
  </nav>

  <div class="admin-overlay" id="adminOverlay" onclick="closeAdminNav()"></div>
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-title">التنقل</div>
    <a href="/dashboard?key={{ key }}"><i class="bi bi-house"></i> الرئيسية</a>
    <a href="/dashboard?key={{ key }}"><i class="bi bi-chat-dots"></i> المحادثات</a>
    <a href="/orders?key={{ key }}"><i class="bi bi-receipt"></i> الطلبات</a>
    <a href="/products?key={{ key }}"><i class="bi bi-box-seam"></i> المنتجات</a>
    <a href="/dashboard?key={{ key }}"><i class="bi bi-people"></i> العملاء</a>
    <a href="/analytics?key={{ key }}"><i class="bi bi-graph-up"></i> التحليلات</a>
    <a href="/evaluation?key={{ key }}"><i class="bi bi-clipboard2-data"></i> التقييم</a>
    <a href="/settings?key={{ key }}"><i class="bi bi-gear"></i> الإعدادات</a>
    <div class="admin-sidebar-title mt-3">الإعدادات</div>
    <a href="/settings/ai?key={{ key }}"><i class="bi bi-robot"></i> الذكاء الاصطناعي</a>
    <a href="/settings/auto-product?key={{ key }}"><i class="bi bi-magic"></i> المنتج التلقائي</a>
    <a href="/settings/catalog?key={{ key }}"><i class="bi bi-images"></i> صور الكتالوج</a>
    <a href="/settings/followup?key={{ key }}"><i class="bi bi-send"></i> المتابعة</a>
    <a href="/settings/channels?key={{ key }}"><i class="bi bi-broadcast"></i> القنوات</a>
    <a href="/settings/store?key={{ key }}"><i class="bi bi-shop-window"></i> المتجر</a>
    <a href="/settings/maintenance?key={{ key }}"><i class="bi bi-tools"></i> الصيانة</a>
  </aside>

  <main class="admin-main">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/admin_pages.js?v=4"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
