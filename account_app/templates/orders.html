<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>طلبات أنيقة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body class="orders-page">
  <nav class="navbar navbar-dark navbar-custom fixed-top px-3">
    <div class="nav-main d-flex align-items-center gap-2">
      <span class="navbar-brand fw-bold fs-6 mb-0">
        <i class="bi bi-receipt-cutoff me-2"></i>طلبات أنيقة
      </span>
    </div>
    <div class="nav-actions d-flex align-items-center gap-2">
      <a class="btn btn-outline-light btn-sm" href="/dashboard?key={{ request.args.get('key','') }}">
        <i class="bi bi-chat-dots me-1"></i>الداشبورد
      </a>
      <a class="btn btn-outline-light btn-sm" href="/products?key={{ request.args.get('key','') }}">
        <i class="bi bi-box-seam me-1"></i>المنتجات
      </a>
      <a class="btn btn-outline-light btn-sm" href="/analytics?key={{ request.args.get('key','') }}" title="التحليلات">
        <i class="bi bi-graph-up-arrow me-1"></i>التحليلات
      </a>
      <a class="btn btn-outline-light btn-sm" href="/problems?key={{ request.args.get('key','') }}" title="المشاكل">
        <i class="bi bi-exclamation-triangle me-1"></i>المشاكل
      </a>
      <a class="btn btn-outline-light btn-sm" href="/settings?key={{ request.args.get('key','') }}" title="الإعدادات">
        <i class="bi bi-gear me-1"></i>الإعدادات
      </a>
      <button class="btn btn-outline-light btn-sm" onclick="loadOrders()">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </nav>

  <main class="orders-layout">
    <section class="orders-header">
      <div>
        <div class="fw-bold fs-5">كل الطلبات</div>
        <div class="small" style="color:var(--text-muted)">الطلبات المثبتة من AI أو من الداشبورد تظهر هنا</div>
      </div>
      <div class="orders-stats">
        <div class="orders-stat">
          <span id="ordersTotal">0</span>
          <small>إجمالي</small>
        </div>
        <div class="orders-stat">
          <span id="ordersNew">0</span>
          <small>جديد</small>
        </div>
      </div>
    </section>

    <section class="orders-toolbar">
      <div class="input-group input-group-sm">
        <span class="input-group-text border-0"><i class="bi bi-search" style="color:var(--text-muted)"></i></span>
        <input type="text" class="form-control border-0" id="orderSearch"
          placeholder="بحث بالاسم، الهاتف، المنتج، المحافظة..." oninput="renderOrders()">
      </div>
    </section>

    <section class="orders-table-wrap">
      <div class="table-responsive">
        <table class="table table-dark table-hover align-middle orders-table mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>الوقت</th>
              <th>الزبون</th>
              <th>الهاتف</th>
              <th>المنتج</th>
              <th>المحافظة</th>
              <th>العنوان</th>
              <th>القياس</th>
              <th>الحالة</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr>
              <td colspan="9" class="text-center py-5" style="color:var(--text-muted)">
                <div class="spinner-border spinner-border-sm mb-2"></div>
                <div class="small">جاري تحميل الطلبات...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/orders.js"></script>
</body>
</html>
