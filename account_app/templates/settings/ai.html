{% extends "base.html" %}
{% block title %}إعدادات الذكاء الاصطناعي{% endblock %}
{% block content %}
<section class="admin-page-head">
  <div>
    <p class="admin-kicker">الإعدادات</p>
    <h1>الذكاء الاصطناعي</h1>
    <p>عرض حالة الموديلات وحفظ وضع التشغيل العام.</p>
  </div>
</section>

<section class="admin-panel">
  <form id="aiSettingsForm" class="admin-form">
    <label class="form-check form-switch admin-switch">
      <input class="form-check-input" type="checkbox" id="aiEnabled">
      <span>تشغيل الردود التلقائية</span>
    </label>
    <div class="admin-info-grid">
      <div><small>الموديل الرئيسي</small><strong id="mainModel">-</strong></div>
      <div><small>موديل التحسين</small><strong id="improveModel">-</strong></div>
      <div><small>المدقق</small><strong id="checkerState">-</strong></div>
      <div><small>مفتاح OpenRouter</small><strong id="openrouterState">-</strong></div>
    </div>
    <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> حفظ</button>
    <span class="admin-status" id="aiSettingsStatus"></span>
  </form>
</section>
{% endblock %}
{% block scripts %}
<script src="/static/js/settings_pages.js?v=3"></script>
<script>initAISettingsPage();</script>
{% endblock %}
