<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>المشاكل - أنيقة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body class="orders-page">
  <nav class="navbar navbar-dark navbar-custom fixed-top px-3">
    <div class="nav-main d-flex align-items-center gap-2">
      <span class="navbar-brand fw-bold fs-6 mb-0">
        <i class="bi bi-exclamation-triangle me-2"></i>المشاكل
      </span>
    </div>
    <div class="nav-actions d-flex align-items-center gap-2">
      <a class="btn btn-outline-light btn-sm" href="/dashboard?key={{ request.args.get('key','') }}">
        <i class="bi bi-chat-dots me-1"></i>الداشبورد
      </a>
      <a class="btn btn-outline-light btn-sm" href="/orders?key={{ request.args.get('key','') }}">
        <i class="bi bi-receipt me-1"></i>الطلبات
      </a>
      <a class="btn btn-outline-light btn-sm" href="/settings?key={{ request.args.get('key','') }}" title="الإعدادات">
        <i class="bi bi-gear me-1"></i>الإعدادات
      </a>
      <button class="btn btn-outline-light btn-sm" onclick="loadProblems()">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </nav>

  <main class="orders-layout">
    <section class="orders-header">
      <div>
        <div class="fw-bold fs-5">تقارير المشاكل</div>
        <div class="small" style="color:var(--text-muted)">المشاكل المكتشفة تلقائياً أو من خلال كلمات الشكوى تُعرض هنا.</div>
      </div>
      <div class="orders-stats">
        <div class="orders-stat">
          <span id="problemsTotal">0</span>
          <small>إجمالي</small>
        </div>
        <div class="orders-stat">
          <span id="problemsOpen">0</span>
          <small>معلقة</small>
        </div>
      </div>
    </section>

    <section class="orders-toolbar">
      <div class="row g-2">
        <div class="col-md-8">
          <div class="input-group input-group-sm">
            <span class="input-group-text border-0"><i class="bi bi-search" style="color:var(--text-muted)"></i></span>
            <input type="text" class="form-control border-0" id="problemSearch"
              placeholder="بحث بالاسم، الرسالة، السبب أو المنتج..." oninput="renderProblems()">
          </div>
        </div>
        <div class="col-md-4">
          <div class="btn-group w-100 btn-group-sm" role="group">
            <button class="btn btn-outline-secondary active" id="filterAllBtn" onclick="setProblemFilter('all', this)">الكل</button>
            <button class="btn btn-outline-secondary" id="filterOpenBtn" onclick="setProblemFilter('open', this)">معلقة</button>
            <button class="btn btn-outline-secondary" id="filterClosedBtn" onclick="setProblemFilter('closed', this)">مغلقة</button>
          </div>
        </div>
      </div>
    </section>

    <section class="orders-table-wrap">
      <div class="table-responsive">
        <table class="table table-dark table-hover align-middle orders-table mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>الوقت</th>
              <th>الزبون</th>
              <th>السبب</th>
              <th>الرسالة</th>
              <th>المنتج</th>
              <th>الحالة</th>
              <th>إجراء</th>
            </tr>
          </thead>
          <tbody id="problemsBody">
            <tr>
              <td colspan="8" class="text-center py-5" style="color:var(--text-muted)">
                <div class="spinner-border spinner-border-sm mb-2"></div>
                <div class="small">جاري تحميل مشاكل الزبائن...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/problems.js"></script>
</body>
</html>
